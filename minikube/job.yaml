apiVersion: batch/v1
kind: Job
metadata:
  name: quotation-book-postgres-migration
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: quotation-book-postgres-migration
        image: quotation-book-postgres-migration:latest
        imagePullPolicy: Never
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        envFrom:
          - configMapRef:
              name: quotation-book-postgres
          - configMapRef:
              name: quotation-book-postgres-migration

---
apiVersion: batch/v1
kind: Job
metadata:
  name: quotation-book-minio-migration
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
      - name: wait-minio
        image: quotation-book-dotnet-obs:latest
        imagePullPolicy: Never
        command:
        - sh
        - -c
        - |
          until curl -k -f https://quotation-book-minio:9000/minio/health/ready; do
            echo "waiting for minio"
            sleep 5
          done
      containers:
      - name: quotation-book-minio-migration
        image: quotation-book-minio-migration:latest
        imagePullPolicy: Never
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        envFrom:
          - configMapRef:
              name: quotation-book-minio
          - configMapRef:
              name: quotation-book-minio-migration
