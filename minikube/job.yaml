apiVersion: batch/v1
kind: Job
metadata:
  name: quotation-book-backend-collectstatic
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: quotation-book-backend-collectstatic
        image: quotation-book-backend:latest
        command:
          - /opt/app-root/src/docker-entrypoint.sh
        args:
          - collectstatic
        imagePullPolicy: Never
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        envFrom:
          - configMapRef:
              name: quotation-book-backend
        env:
          - name: DB_HOST
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: POSTGRES_DB_HOST
          - name: DB_PORT
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: POSTGRES_DB_PORT
          - name: REDIS_SSL
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: ENABLE_SSL_REDIS
          - name: REDIS_PORT
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: REDIS_PORT_TLS
          - name: RABBITMQ_PORT
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: RABBITMQ_PORT_SSL
          - name: DB_NAME
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: POSTGRES_DB_NAME
          - name: DB_USER
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: POSTGRES_DB_USER
          - name: DB_PASSWORD
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: POSTGRES_DB_PASSWORD
          - name: MINIO_ACCESS_KEY
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: MINIO_ROOT_USER
          - name: MINIO_SECRET_KEY
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: MINIO_ROOT_PASSWORD
        volumeMounts:
          - name: backend-data
            mountPath: /opt/app-root/src/static
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: quotation-book-backend-data

