apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotation-book-rabbitmq
spec:
  selector:
    matchLabels:
      app: quotation-book-rabbitmq
  replicas: 1
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: quotation-book-rabbitmq
    spec:
      containers:
      - name: quotation-book-rabbitmq
        image: quotation-book-rabbitmq:latest
        imagePullPolicy: Never
        ports:
        - name: management
          containerPort: 15672
        - name: amqp
          containerPort: 5672
        - name: amqps
          containerPort: 5671
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
          - name: rabbitmq-data
            mountPath: /var/lib/rabbitmq
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - >
              curl
              -f
              -u ${RABBITMQ_USER}:${RABBITMQ_PASSWORD}
              http://localhost:${RABBITMQ_MANAGEMENT_PORT}/api/overview
          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - >
              curl
              -f
              -u ${RABBITMQ_USER}:${RABBITMQ_PASSWORD}
              http://localhost:${RABBITMQ_MANAGEMENT_PORT}/api/overview
          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: quotation-book-rabbitmq
        env:
          - name: ENABLE_SSL
            valueFrom:
              configMapKeyRef:
                name: quotation-book-rabbitmq
                key: ENABLE_SSL_RABBITMQ
          - name: SSL_PORT
            valueFrom:
              configMapKeyRef:
                name: quotation-book-rabbitmq
                key: RABBITMQ_PORT_SSL
          - name: CA_CERT_FILE
            valueFrom:
              configMapKeyRef:
                name: quotation-book-rabbitmq
                key: CA_CERTIFICATE
          - name: CERT_FILE
            valueFrom:
              configMapKeyRef:
                name: quotation-book-rabbitmq
                key: RABBITMQ_CERT_FILE
          - name: KEY_FILE
            valueFrom:
              configMapKeyRef:
                name: quotation-book-rabbitmq
                key: RABBITMQ_KEY_FILE
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: quotation-book-rabbitmq-data

