apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotation-book-frontend
spec:
  selector:
    matchLabels:
      app: quotation-book-frontend
  replicas: 1
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: quotation-book-frontend
    spec:
      containers:
      - name: quotation-book-frontend
        image: quotation-book-frontend:latest
        imagePullPolicy: Never
        ports:
        - name: https-frontend
          containerPort: 8443
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
          - name: backend-data
            mountPath: /opt/app-root/src/static
        livenessProbe:
          exec:
            command:
            - curl
            - -k
            - -f
            - https://localhost:8443/health
          initialDelaySeconds: 20
          timeoutSeconds: 10
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - curl
            - -k
            - -f
            - https://localhost:8443/health
          initialDelaySeconds: 20
          timeoutSeconds: 10
          periodSeconds: 30
        envFrom:
          - configMapRef:
              name: quotation-book-frontend
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: quotation-book-backend-data

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotation-book-backend
spec:
  selector:
    matchLabels:
      app: quotation-book-backend
  replicas: 1
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: quotation-book-backend
    spec:
      containers:
      - name: quotation-book-backend
        image: quotation-book-backend:latest
        command:
          - /opt/app-root/src/docker-entrypoint.sh
        args:
          - backend
        imagePullPolicy: Never
        ports:
        - name: backend
          containerPort: 5000
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi
        volumeMounts:
          - name: backend-data
            mountPath: /opt/app-root/src/static
        livenessProbe:
          exec:
            command:
            - curl
            - -k
            - -f
            - https://localhost:5000/check
          initialDelaySeconds: 15
          timeoutSeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - curl
            - -k
            - -f
            - https://localhost:5000/check
          initialDelaySeconds: 15
          timeoutSeconds: 10
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: quotation-book-backend
        env:
          - name: DB_HOST
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: POSTGRES_DB_HOST
          - name: DB_PORT
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: POSTGRES_DB_PORT
          - name: REDIS_SSL
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: ENABLE_SSL_REDIS
          - name: REDIS_PORT
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: REDIS_PORT_TLS
          - name: RABBITMQ_PORT
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: RABBITMQ_PORT_SSL
          - name: DB_NAME
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: POSTGRES_DB_NAME
          - name: DB_USER
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: POSTGRES_DB_USER
          - name: DB_PASSWORD
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: POSTGRES_DB_PASSWORD
          - name: MINIO_ACCESS_KEY
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: MINIO_ROOT_USER
          - name: MINIO_SECRET_KEY
            valueFrom:
              configMapKeyRef:
                name: quotation-book-backend
                key: MINIO_ROOT_PASSWORD
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: quotation-book-backend-data

