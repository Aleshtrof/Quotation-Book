---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotation-book-postgres
spec:
  selector:
    matchLabels:
      app: quotation-book-postgres
  replicas: 1
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: quotation-book-postgres
    spec:
      containers:
      - name: quotation-book-postgres
        image: quotation-book-postgres:latest
        imagePullPolicy: Never
        ports:
        - name: postgres
          containerPort: 5432
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 300m
            memory: 768Mi
        volumeMounts:
          - name: postgres-data
            mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: quotation-book-postgres
        env:
          - name: KEYCLOAK_DB_USER
            valueFrom:
              configMapKeyRef:
                name: quotation-book-keycloak
                key: KC_DB_USERNAME
          - name: KEYCLOAK_DB_PASSWORD
            valueFrom:
              configMapKeyRef:
                name: quotation-book-keycloak
                key: KC_DB_PASSWORD
          - name: KEYCLOAK_DB_NAME
            valueFrom:
              configMapKeyRef:
                name: quotation-book-keycloak
                key: KC_DB_NAME
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: quotation-book-postgres-data

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotation-book-redis
spec:
  selector:
    matchLabels:
      app: quotation-book-redis
  replicas: 1
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: quotation-book-redis
    spec:
      containers:
      - name: quotation-book-redis
        image: quotation-book-redis:latest
        imagePullPolicy: Never
        ports:
        - name: redis
          containerPort: 6379
        - name: redis-tls
          containerPort: 6380
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - redis-cli --pass ${REDIS_PASS} ping | grep PONG
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 20
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - redis-cli --pass ${REDIS_PASS} ping | grep PONG
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 20
        envFrom:
          - configMapRef:
              name: quotation-book-redis
        env:
          - name: TLS_PORT
            valueFrom:
              configMapKeyRef:
                name: quotation-book-redis
                key: REDIS_PORT_TLS
          - name: ENABLE_SSL
            valueFrom:
              configMapKeyRef:
                name: quotation-book-redis
                key: ENABLE_SSL_REDIS
          - name: TLS_CERT_FILE
            valueFrom:
              configMapKeyRef:
                name: quotation-book-redis
                key: TLS_CERT_FILE_REDIS
          - name: TLS_KEY_FILE
            valueFrom:
              configMapKeyRef:
                name: quotation-book-redis
                key: TLS_KEY_FILE_REDIS
          - name: TLS_CA_CERT_FILE
            valueFrom:
              configMapKeyRef:
                name: quotation-book-redis
                key: CA_CERTIFICATE

