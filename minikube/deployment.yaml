---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotation-book-keycloak
spec:
  selector:
    matchLabels:
      app: quotation-book-keycloak
  replicas: 1
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: quotation-book-keycloak
    spec:
      initContainers:
      - name: wait-for-postgres
        image: quotation-book-postgres:latest
        imagePullPolicy: Never
        command:
          - sh
          - -c
          - |
            until pg_isready -h quotation-book-postgres -p 5432; do
              echo "Waiting for postgres..."
              sleep 2
            done
      containers:
      - name: quotation-book-keycloak
        image: quotation-book-keycloak:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: 8081
        - name: https
          containerPort: 1443
        - name: https-external
          containerPort: 8443
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 300m
            memory: 512Mi
        startupProbe:
          exec:
            command:
              - curl
              - -k
              - --head
              - -fsS
              - http://localhost:8081/health/ready
          failureThreshold: 20
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
              - curl
              - -k
              - --head
              - -fsS
              - http://localhost:8081/health/ready
          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
              - curl
              - -k
              - --head
              - -fsS
              - http://localhost:8081/health/ready
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: quotation-book-keycloak

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotation-book-pgadmin
spec:
  selector:
    matchLabels:
      app: quotation-book-pgadmin
  replicas: 1
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: quotation-book-pgadmin
    spec:
      containers:
      - name: quotation-book-pgadmin
        image: quotation-book-pgadmin:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: 80
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        startupProbe:
          httpGet:
            path: /misc/ping
            port: 80
          failureThreshold: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /misc/ping
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /misc/ping
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: quotation-book-pgadmin
        env:
          - name: PGADMIN_DEFAULT_EMAIL
            valueFrom:
              configMapKeyRef:
                name: quotation-book-pgadmin
                key: PG_ADMIN_USER
          - name: PGADMIN_DEFAULT_PASSWORD
            valueFrom:
              configMapKeyRef:
                name: quotation-book-pgadmin
                key: PG_ADMIN_PASSWORD

