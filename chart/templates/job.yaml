---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "qo.fullname" . }}-postgres-migration
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: quotation-book-postgres-migration
        image: quotation-book-postgres-migration:{{ .Values.postgresMigration.image.tag | default "latest" }}
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        {{- with .Values.postgresMigration.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        envFrom:
          - configMapRef:
              name: quotation-book-postgres
          - configMapRef:
              name: quotation-book-postgres-migration

---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "qo.fullname" . }}-minio-migration
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
      - name: wait-minio
        image: quotation-book-dotnet-obs:{{ .Values.postgres.image.tag | default "latest" }}
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        command:
        - sh
        - -c
        - |
          until curl -k -f https://quotation-book-minio:9000/minio/health/ready; do
            echo "waiting for minio"
            sleep 5
          done
      containers:
      - name: quotation-book-minio-migration
        image: quotation-book-minio-migration:{{ .Values.minioMigration.image.tag | default "latest" }}
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        {{- with .Values.minioMigration.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        envFrom:
          - configMapRef:
              name: quotation-book-minio
          - configMapRef:
              name: quotation-book-minio-migration
