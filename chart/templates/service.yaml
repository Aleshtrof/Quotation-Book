  name: {{ include "qo.fullname" . }}-postgres
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    app: quotation-book-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qo.fullname" . }}-redis
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    app: quotation-book-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: redis-tls
      port: 6380
      targetPort: 6380

---
apiVersion: v1
kind: Service
