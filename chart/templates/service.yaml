  name: {{ include "qo.fullname" . }}-rabbitmq
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    app: quotation-book-rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: amqps
      port: 5671
      targetPort: 5671

