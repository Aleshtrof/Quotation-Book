apiVersion: v1
kind: Service
metadata:
  name: {{ include "qo.fullname" . }}-frontend
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
#  type: NodePort
  selector:
    app: quotation-book-frontend
  ports:
    - name: https-frontend
      port: 8443
      targetPort: 8443
#      nodePort: 30443

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qo.fullname" . }}-backend
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    app: quotation-book-backend
  ports:
    - name: backend
      port: 5000
      targetPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qo.fullname" . }}-backend-worker
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    app: quotation-book-backend-worker
  ports:
    - name: backend
      port: 5000
      targetPort: 5000

---
apiVersion: v1
