  REDIS_HOST: "quotation-book-redis"
  REDIS_PORT_TLS: "6380"   ## REDIS_PORT: "${REDIS_PORT_TLS}"
  REDIS_PASS: "qpowejAskAKSncKSxZ"
  KEYCLOAK_HOST: "quotation-book-keycloak"
  KEYCLOAK_PORT: "8081"
  RABBITMQ_USER: "gpn-admin"
  RABBITMQ_PASSWORD: "changeme"
  RABBITMQ_HOST: "quotation-book-rabbitmq"
  RABBITMQ_PORT_SSL: "5671"     ## RABBITMQ_PORT: "${RABBITMQ_PORT_SSL}"
  RABBITMQ_VHOST: "/"
  POSTGRES_DB_NAME: "quotations"    ## DB_NAME: "${POSTGRES_DB_NAME}"
  POSTGRES_DB_USER: "jason"    ## DB_USER: "${POSTGRES_DB_USER}"
  POSTGRES_DB_PASSWORD: "P0aIIp44ESxTFNsb"    ## DB_PASSWORD: "${POSTGRES_DB_PASSWORD}"
