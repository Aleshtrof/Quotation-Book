apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "qo.fullname" . }}-backend
  labels:
    {{- include "qo.labels" . | nindent 4 }}
data:
  PIP_INDEX_URL_PARAM: "https://pypi.org/simple/"
  PIP_TRUSTED_HOST_PARAM: "pypi.org"
  KEYCLOAK_CLIENT_ID: "quotation-book-client"
  KEYCLOAK_CLIENT_SECRET: "QuotationBookSecret123!"
