          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: {{ include "qo.fullname" . }}-rabbitmq
        env:
          - name: ENABLE_SSL
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-rabbitmq
                key: ENABLE_SSL_RABBITMQ
          - name: SSL_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-rabbitmq
                key: RABBITMQ_PORT_SSL
          - name: CA_CERT_FILE
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-rabbitmq
                key: CA_CERTIFICATE
          - name: CERT_FILE
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-rabbitmq
                key: RABBITMQ_CERT_FILE
          - name: KEY_FILE
