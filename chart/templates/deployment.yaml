apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qo.fullname" . }}-redis
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: quotation-book-redis
  replicas: {{ .Values.application.replicaCount }}
  revisionHistoryLimit: {{ .Values.application.revisionHistoryLimit }}
  template:
    metadata:
      labels:
        app: quotation-book-redis
    spec:
      containers:
      - name: redis
        image: quotation-book-redis:{{ .Values.redis.image.tag | default "latest" }}
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        ports:
        - name: redis
          containerPort: 6379
        - name: redis-tls
          containerPort: 6380
        {{- with .Values.redis.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - redis-cli --pass ${REDIS_PASS} ping | grep PONG
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 20
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - redis-cli --pass ${REDIS_PASS} ping | grep PONG
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 20
        envFrom:
          - configMapRef:
              name: {{ include "qo.fullname" . }}-redis
        env:
          - name: TLS_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-redis
                key: REDIS_PORT_TLS
          - name: ENABLE_SSL
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-redis
                key: ENABLE_SSL_REDIS
          - name: TLS_CERT_FILE
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-redis
                key: TLS_CERT_FILE_REDIS
          - name: TLS_KEY_FILE
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-redis
                key: TLS_KEY_FILE_REDIS
          - name: TLS_CA_CERT_FILE
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-redis
                key: CA_CERTIFICATE

