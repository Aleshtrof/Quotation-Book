apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qo.fullname" . }}-frontend
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: quotation-book-frontend
  replicas: {{ .Values.application.replicaCount }}
  revisionHistoryLimit: {{ .Values.application.revisionHistoryLimit }}
  template:
    metadata:
      labels:
        app: quotation-book-frontend
    spec:
      containers:
      - name: frontend
        image: quotation-book-frontend:{{ .Values.frontend.image.tag | default "latest" }}
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        ports:
        - name: https-frontend
          containerPort: 8443
        {{- with .Values.frontend.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
          - name: backend-data
            mountPath: /opt/app-root/src/static
        livenessProbe:
          exec:
            command:
            - curl
            - -k
            - -f
            - https://localhost:8443/health
          initialDelaySeconds: 20
          timeoutSeconds: 10
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - curl
            - -k
            - -f
            - https://localhost:8443/health
          initialDelaySeconds: 20
          timeoutSeconds: 10
          periodSeconds: 30
        envFrom:
          - configMapRef:
              name: {{ include "qo.fullname" . }}-frontend
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: {{ include "qo.fullname" . }}-backend-data

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qo.fullname" . }}-backend
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: quotation-book-backend
  replicas: {{ .Values.application.replicaCount }}
  revisionHistoryLimit: {{ .Values.application.revisionHistoryLimit }}
  template:
    metadata:
      labels:
        app: quotation-book-backend
    spec:
      containers:
      - name: backend
        image: quotation-book-backend:{{ .Values.backend.image.tag | default "latest" }}
        command:
          - /opt/app-root/src/docker-entrypoint.sh
        args:
          - backend
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        ports:
        - name: backend
          containerPort: 5000
        {{- with .Values.backend.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
          - name: backend-data
            mountPath: /opt/app-root/src/static
        livenessProbe:
          exec:
            command:
            - curl
            - -k
            - -f
            - https://localhost:5000/check
          initialDelaySeconds: 15
          timeoutSeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - curl
            - -k
            - -f
            - https://localhost:5000/check
          initialDelaySeconds: 15
          timeoutSeconds: 10
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: {{ include "qo.fullname" . }}-backend
        env:
          - name: DB_HOST
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-backend
                key: POSTGRES_DB_HOST
          - name: DB_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-backend
                key: POSTGRES_DB_PORT
          - name: REDIS_SSL
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-backend
                key: ENABLE_SSL_REDIS
          - name: REDIS_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-backend
                key: REDIS_PORT_TLS
          - name: RABBITMQ_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-backend
                key: RABBITMQ_PORT_SSL
          - name: DB_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-backend
                key: POSTGRES_DB_NAME
          - name: DB_USER
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-backend
                key: POSTGRES_DB_USER
          - name: DB_PASSWORD
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-backend
                key: POSTGRES_DB_PASSWORD
          - name: MINIO_ACCESS_KEY
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-backend
                key: MINIO_ROOT_USER
          - name: MINIO_SECRET_KEY
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-backend
                key: MINIO_ROOT_PASSWORD
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: {{ include "qo.fullname" . }}-backend-data

