apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qo.fullname" . }}-postgres
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: quotation-book-postgres
  replicas: {{ .Values.application.replicaCount }}
  revisionHistoryLimit: {{ .Values.application.revisionHistoryLimit }}
  template:
    metadata:
      labels:
        app: quotation-book-postgres
    spec:
      containers:
      - name: postgres
        image: quotation-book-postgres:{{ .Values.postgres.image.tag | default "latest" }}
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        ports:
        - name: postgres
          containerPort: 5432
        {{- with .Values.postgres.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
          - name: postgres-data
            mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: {{ include "qo.fullname" . }}-postgres
        env:
          - name: KEYCLOAK_DB_USER
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-keycloak
                key: KC_DB_USERNAME
          - name: KEYCLOAK_DB_PASSWORD
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-keycloak
                key: KC_DB_PASSWORD
          - name: KEYCLOAK_DB_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "qo.fullname" . }}-keycloak
                key: KC_DB_NAME
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "qo.fullname" . }}-postgres-data

