---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qo.fullname" . }}-keycloak
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: quotation-book-keycloak
  replicas: {{ .Values.application.replicaCount }}
  revisionHistoryLimit: {{ .Values.application.revisionHistoryLimit }}
  template:
    metadata:
      labels:
        app: quotation-book-keycloak
    spec:
      initContainers:
      - name: wait-for-postgres
        image: quotation-book-postgres:{{ .Values.postgres.image.tag | default "latest" }}
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        command:
          - sh
          - -c
          - |
            until pg_isready -h quotation-book-postgres -p 5432; do
              echo "Waiting for postgres..."
              sleep 2
            done
      containers:
      - name: keycloak
        image: quotation-book-keycloak:{{ .Values.keycloak.image.tag | default "latest" }}
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        ports:
        - name: http
          containerPort: 8081
        - name: https
          containerPort: 1443
        - name: https-external
          containerPort: 8443
        {{- with .Values.keycloak.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        startupProbe:
          exec:
            command:
              - curl
              - -k
              - --head
              - -fsS
              - http://localhost:8081/health/ready
          failureThreshold: 20
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
              - curl
              - -k
              - --head
              - -fsS
              - http://localhost:8081/health/ready
          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
              - curl
              - -k
              - --head
              - -fsS
              - http://localhost:8081/health/ready
          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: {{ include "qo.fullname" . }}-keycloak

