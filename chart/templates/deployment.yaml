    metadata:
      labels:
        app: quotation-book-dotnet-obs
    spec:
      containers:
      - name: dotnet-obs
        image: quotation-book-dotnet-obs:{{ .Values.dotnetObs.image.tag | default "latest" }}
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        ports:
        - name: https
          containerPort: 1443
        {{- with .Values.dotnetObs.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          exec:
            command:
            - curl
            - -k
            - -f
            - https://localhost:1443/status
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 20
        readinessProbe:
          exec:
            command:
            - curl
            - -k
            - -f
            - https://localhost:1443/status
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 20
