apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qo.fullname" . }}-rabbitmq
  labels:
    {{- include "qo.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: quotation-book-rabbitmq
  replicas: {{ .Values.application.replicaCount }}
  revisionHistoryLimit: {{ .Values.application.revisionHistoryLimit }}
  template:
    metadata:
      labels:
        app: quotation-book-rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: quotation-book-rabbitmq:{{ .Values.rabbitmq.image.tag | default "latest" }}
        imagePullPolicy: {{ .Values.application.imagePullPolicy }}
        ports:
        - name: management
          containerPort: 15672
        - name: amqp
          containerPort: 5672
        - name: amqps
          containerPort: 5671
        {{- with .Values.rabbitmq.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
          - name: rabbitmq-data
